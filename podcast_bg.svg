  <ellipse cx="88" cy="181" rx="52" ry="35" fill="#C8A010"/>
  <ellipse cx="88" cy="179" rx="50" ry="33" fill="#F9DB6D"/>
  <ellipse cx="136" cy="179" rx="8" ry="5" fill="#D4B020"/>
  <ellipse cx="40" cy="179" rx="7" ry="5" fill="#D4B020"/>
  <ellipse cx="74" cy="168" rx="18" ry="10" fill="#FFF8C0" opacity="0.5"/>

  <!-- Leaf 2 -->
  <path d="M 145 184 Q 172 158 190 167 Q 171 183 148 188 Z" fill="#6BA040"/>
  <path d="M 145 184 Q 170 160 188 168" stroke="#5A8A30" stroke-width="0.8" fill="none"/>

  <!-- Whole lemon 2 -->
  <ellipse cx="225" cy="189" rx="45" ry="30" fill="#C8A010"/>
  <ellipse cx="225" cy="187" rx="43" ry="28" fill="#F4C830"/>
  <ellipse cx="266" cy="187" rx="7" ry="4" fill="#D4B020"/>
  <ellipse cx="184" cy="187" rx="7" ry="4" fill="#D4B020"/>
  <ellipse cx="212" cy="178" rx="14" ry="8" fill="#FFF8C0" opacity="0.45"/>

