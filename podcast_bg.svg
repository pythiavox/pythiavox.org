  <path d="M 592 182 Q 608 162 620 170 Q 605 181 593 185 Z" fill="#5A8A3C" opacity="0.85"/>
  <ellipse cx="625" cy="181" rx="45" ry="31" fill="#C8A010"/>
  <ellipse cx="625" cy="179" rx="43" ry="29" fill="#F9DB6D"/>
  <ellipse cx="666" cy="179" rx="7" ry="4" fill="#D4B020"/>
  <ellipse cx="584" cy="179" rx="7" ry="4" fill="#D4B020"/>
  <ellipse cx="611" cy="169" rx="14" ry="8" fill="#FFF8C0" opacity="0.5"/>

  <!-- Scattered juice drops on counter -->
  <ellipse cx="265" cy="210" rx="3" ry="2" fill="#F9E04B" opacity="0.4"/>
  <ellipse cx="375" cy="215" rx="2.5" ry="1.5" fill="#F9E04B" opacity="0.38"/>
  <ellipse cx="252" cy="222" rx="2" ry="1.5" fill="#F9E04B" opacity="0.32"/>

  <!-- Herb sprigs -->
  <path d="M 252 202 Q 262 193 268 200 Q 261 206 252 202 Z" fill="#6BA040" opacity="0.7"/>
  <path d="M 372 204 Q 381 196 386 203 Q 379 209 372 204 Z" fill="#5A8A3C" opacity="0.65"/>

</svg>
