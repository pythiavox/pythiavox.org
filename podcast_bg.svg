  <line x1="226" y1="0" x2="226" y2="200" stroke="#EDE0C4" stroke-width="0.5"/>
  <line x1="340" y1="0" x2="340" y2="200" stroke="#EDE0C4" stroke-width="0.5"/>
  <line x1="453" y1="0" x2="453" y2="200" stroke="#EDE0C4" stroke-width="0.5"/>
