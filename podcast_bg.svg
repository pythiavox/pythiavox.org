  <line x1="413" y1="193" x2="413" y2="203" stroke="#9A6830" stroke-width="0.6" opacity="0.5"/>
  <line x1="430" y1="193" x2="430" y2="203" stroke="#9A6830" stroke-width="0.6" opacity="0.5"/>
  <line x1="447" y1="193" x2="447" y2="203" stroke="#9A6830" stroke-width="0.6" opacity="0.5"/>
  <line x1="464" y1="193" x2="464" y2="203" stroke="#9A6830" stroke-width="0.6" opacity="0.5"/>
  <line x1="481" y1="193" x2="481" y2="203" stroke="#9A6830" stroke-width="0.6" opacity="0.5"/>
  <line x1="498" y1="193" x2="498" y2="203" stroke="#9A6830" stroke-width="0.6" opacity="0.5"/>
  <line x1="515" y1="193" x2="515" y2="203" stroke="#9A6830" stroke-width="0.6" opacity="0.5"/>
  <line x1="532" y1="193" x2="532" y2="203" stroke="#9A6830" stroke-width="0.6" opacity="0.5"/>
