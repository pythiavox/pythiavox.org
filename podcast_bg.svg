  <!-- Points: top(445,160) top-rt(460.6,171) bot-rt(460.6,193) bot(445,204) bot-lt(429.4,193) top-lt(429.4,171) -->
  <circle cx="445" cy="182" r="26" fill="#C8A010"/>
  <circle cx="445" cy="182" r="22" fill="#FFFDE7"/>
  <path d="M445 182 L445 160 A22 22 0 0 1 464 171 Z" fill="#F9DB6D"/>
  <path d="M445 182 L464 171 A22 22 0 0 1 464 193 Z" fill="#F0C830"/>
  <path d="M445 182 L464 193 A22 22 0 0 1 445 204 Z" fill="#F9DB6D"/>
  <path d="M445 182 L445 204 A22 22 0 0 1 426 193 Z" fill="#F0C830"/>
  <path d="M445 182 L426 193 A22 22 0 0 1 426 171 Z" fill="#F9DB6D"/>
  <path d="M445 182 L426 171 A22 22 0 0 1 445 160 Z" fill="#F0C830"/>
  <line x1="445" y1="182" x2="445" y2="160" stroke="#C0A010" stroke-width="0.5" opacity="0.7"/>
  <line x1="445" y1="182" x2="464" y2="171" stroke="#C0A010" stroke-width="0.5" opacity="0.7"/>
  <line x1="445" y1="182" x2="464" y2="193" stroke="#C0A010" stroke-width="0.5" opacity="0.7"/>
  <line x1="445" y1="182" x2="445" y2="204" stroke="#C0A010" stroke-width="0.5" opacity="0.7"/>
  <line x1="445" y1="182" x2="426" y2="193" stroke="#C0A010" stroke-width="0.5" opacity="0.7"/>
  <line x1="445" y1="182" x2="426" y2="171" stroke="#C0A010" stroke-width="0.5" opacity="0.7"/>
  <circle cx="445" cy="182" r="22" fill="none" stroke="#C8A010" stroke-width="1.5"/>
  <circle cx="445" cy="182" r="3" fill="#F4D03F"/>

  <!-- Cut lemon half 2 (slightly rotated) cx=528, cy=182 -->
  <g transform="translate(528 182) rotate(-22)">
    <circle cx="0" cy="0" r="24" fill="#C8A010"/>
    <circle cx="0" cy="0" r="20" fill="#FFFDE7"/>
    <path d="M0 0 L0 -20 A20 20 0 0 1 17.3 -10 Z" fill="#F9DB6D"/>
    <path d="M0 0 L17.3 -10 A20 20 0 0 1 17.3 10 Z" fill="#F0C830"/>
    <path d="M0 0 L17.3 10 A20 20 0 0 1 0 20 Z" fill="#F9DB6D"/>
    <path d="M0 0 L0 20 A20 20 0 0 1 -17.3 10 Z" fill="#F0C830"/>
    <path d="M0 0 L-17.3 10 A20 20 0 0 1 -17.3 -10 Z" fill="#F9DB6D"/>
    <path d="M0 0 L-17.3 -10 A20 20 0 0 1 0 -20 Z" fill="#F0C830"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#C8A010" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="3" fill="#F4D03F"/>
