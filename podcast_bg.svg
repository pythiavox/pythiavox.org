  <circle cx="312" cy="163" r="15" fill="#D4AA20" opacity="0.8"/>
  <circle cx="312" cy="163" r="12" fill="#FFFDE7" opacity="0.9"/>
  <line x1="312" y1="151" x2="312" y2="175" stroke="#C8A010" stroke-width="0.5" opacity="0.7"/>
  <line x1="300" y1="163" x2="324" y2="163" stroke="#C8A010" stroke-width="0.5" opacity="0.7"/>
  <line x1="304" y1="155" x2="320" y2="171" stroke="#C8A010" stroke-width="0.4" opacity="0.6"/>
